<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="fav.png">
</head>
<body>
    <h1 class="header">Weather App By Dev Abisai🤓</h1>
    <form class="weatherform">
        <input type="text" id="userinput" placeholder="Enter the name of the city">
        <button type="submit">Search</button>
    </form>
    <div class="display">
        <h1 id="city"></h1>
        <p class="tempDisplay"></p>
        <p class="humidty"></p>
        <p class="windspeed"></p>
        <p class="descdisplay"></p>
        <p class="weatherEmoji"></p>
        <p id="errorDisplay"></p>
    </div>

    <div class="display">
        <h1 id="city">After 6 hours</h1>
        <p class="tempDisplay"></p>
        <p class="humidty"></p>
        <p class="windspeed"></p>
        <p class="descdisplay"></p>
        <p class="weatherEmoji"></p>
    </div>

    <div class="display">
        <h1 id="city">After 12 hours</h1>
        <p class="tempDisplay"></p>
        <p class="humidty"></p>
        <p class="windspeed"></p>
        <p class="descdisplay"></p>
        <p class="weatherEmoji"></p>
    </div>

    <div class="display">
        <h1 id="city">After 18 hours</h1>
        <p class="tempDisplay"></p>
        <p class="humidty"></p>
        <p class="windspeed"></p>
        <p class="descdisplay"></p>
        <p class="weatherEmoji"></p>
    </div>
    
    <div class="loader">
        <span class="rotating" ></span>
        <span class="rotating" ></span>
        <span class="rotating" ></span>
        <span class="rotating" ></span>
        <span class="rotating" ></span>
        <span class="rotating" ></span>
    </div>


    <script src="index.js"></script>

</body>
</html>
